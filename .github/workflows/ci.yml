name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # The runtime deps (mlx-audio) are Apple-Silicon-only and won't install on
      # Linux, so CI installs only the dev tools. The pytest suite is invariant-only
      # by design — heavy imports are function-local, so it needs neither MLX,
      # ffmpeg, nor the save-to-spotify CLI.
      # ruff is pinned exactly so CI matches the version validated locally and in
      # .pre-commit-config.yaml — a floating ruff can promote rules and redden CI.
      # Keep this in lockstep with the pre-commit rev and pyproject's `dev` extra.
      - name: Install dev tools
        run: python -m pip install "ruff==0.14.10" "pytest>=8.0"

      - name: Ruff lint
        run: ruff check .

      # Format is advisory (the renderer keeps a hand-tuned layout); never blocks.
      - name: Ruff format (advisory)
        run: ruff format --check . || echo "::warning::ruff format differences (advisory, not enforced)"

      - name: Tests
        run: pytest
