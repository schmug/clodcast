# git-cliff configuration — https://git-cliff.org
#
# Drives CHANGELOG.md and the GitHub Release notes from conventional commits.
# The commit-prefix groups below mirror the prefixes mandated in the repo's
# CLAUDE.md (feat/fix/docs/refactor/security/chore/...), which is exactly why
# that convention is load-bearing: these parsers turn the prefixes into a
# human-readable changelog. Keep the `commit_parsers` groups in sync with the
# allowed prefixes if that list ever changes.

[changelog]
# Rendered with Tera templates. `header` is emitted once at the top of the file.
header = """
# Changelog

All notable changes to this project are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/),
and this project adheres to [Semantic Versioning](https://semver.org/).
This file is generated from conventional commits by [git-cliff](https://git-cliff.org).\n
"""
# Per-release body. `version` is the tag (or empty when --unreleased is used
# without a bump). Commits are grouped by the labels set in commit_parsers; the
# `<!-- N -->` HTML-comment prefixes only set ordering and are stripped for display.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | trim | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
# Only Conventional-Commit-shaped messages become changelog lines.
conventional_commits = true
filter_unconventional = true
split_commits = false
# No commit_preprocessors: the changelog line is derived from the commit
# subject in the body template (split → first line). PR-number refs in the
# subject (e.g. "(#41)") are intentionally kept as useful provenance links.
# A message-wide regex strip here collapsed multi-line bodies and broke
# conventional parsing, so it was removed.
commit_preprocessors = []
# Order matters: the first matching parser wins. `skip = true` drops the commit.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^security", group = "<!-- 2 -->Security" },
    { message = "^refactor", group = "<!-- 3 -->Refactor" },
    { message = "^perf", group = "<!-- 4 -->Performance" },
    { message = "^docs", group = "<!-- 5 -->Documentation" },
    { message = "^test", group = "<!-- 6 -->Testing" },
    { message = "^style", group = "<!-- 7 -->Styling" },
    { message = "^chore", group = "<!-- 8 -->Miscellaneous" },
    { message = "^ci", group = "<!-- 8 -->Miscellaneous" },
    { message = "^build", group = "<!-- 8 -->Miscellaneous" },
    # Anything else conventional-shaped but unmapped also lands in Miscellaneous.
    { message = ".*", group = "<!-- 8 -->Miscellaneous" },
]
protect_breaking_commits = false
filter_commits = false
# Semver tags only — first release is v0.1.0, there are no pre-release tags
# (alpha/beta/rc) by design (see the release issue's out-of-scope list).
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
